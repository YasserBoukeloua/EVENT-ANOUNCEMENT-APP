name: eventify
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/
    - lib/assets/lang/

  fonts:
    - family: JosefinSans
      fonts:
        - asset: lib/fonts/static/JosefinSans-Bold.ttf
          weight: 700
